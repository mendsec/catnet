name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Verify modules
        run: go mod tidy && git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
