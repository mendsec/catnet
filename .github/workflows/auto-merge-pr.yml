name: Auto Merge PR (develop → main)

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for new commits
        run: |
          COUNT=$(git rev-list --count origin/main..origin/develop 2>/dev/null || echo "0")
          if [ "$COUNT" -eq "0" ]; then
            echo "No new commits, nothing to do."
            exit 0
          fi

      - name: Close old PR (develop → main)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_PR=$(gh pr list --head develop --base main --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$OLD_PR" ]; then
            gh pr close "$OLD_PR" --comment "Replaced by new PR." 2>/dev/null || true
          fi

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head develop \
            --title "chore: merge develop → main" \
            --body "Automated PR by github-actions[bot]." \
            || echo "PR already exists, skipping."
