name: Auto Merge PR (develop → main)

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup SSH signing
        env:
          SSH_KEY: ${{ secrets.BOT_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "BOT_SSH_PRIVATE_KEY is not set, cannot sign commits."
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub
          git config gpg.format ssh
          git config user.signingkey ~/.ssh/id_ed25519.pub
          git config commit.gpgsign true
          git config user.name "mendsec"
          git config user.email "fabiomendesilva@gmail.com"
          echo "SSH signing configured."

      - name: Create signed branch
        run: |
          COUNT=$(git rev-list --count origin/main..origin/develop 2>/dev/null || echo "0")
          if [ "$COUNT" -eq "0" ]; then
            echo "No new commits, nothing to do."
            exit 0
          fi
          git checkout -B develop-signed origin/develop
          git filter-branch -f \
            --env-filter 'export GIT_COMMITTER_NAME="mendsec" GIT_COMMITTER_EMAIL="fabiomendesilva@gmail.com"' \
            --commit-filter 'git commit-tree -S "$@"' \
            origin/main..HEAD
          echo "Signed $COUNT commit(s) on develop-signed."
          git push origin HEAD:develop-signed --force-with-lease

      - name: Close old PR (develop → main)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_PR=$(gh pr list --head develop --base main --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$OLD_PR" ]; then
            gh pr close "$OLD_PR" --comment "Replaced by signed PR." 2>/dev/null || true
            echo "Closed old PR #$OLD_PR."
          fi

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head develop-signed \
            --title "chore: merge develop → main" \
            --body "Automated PR by github-actions[bot]." \
            2>/dev/null || \
            echo "PR already exists, skipping."
